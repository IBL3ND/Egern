allow_external_connections: true
vif_only: true
hide_vpn_icon: false
geoip_db_url: https://github.com/xream/geoip/releases/latest/download/ipinfo.country.mmdb
asn_db_url: https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-ASN.mmdb
proxy_latency_test_url: https://connectivitycheck.gstatic.com/generate_204
direct_latency_test_url: https://www.qq.com
udp_latency_test_url: google.com@8.8.8.8
compat_route: true
dns:
  upstreams:
    国外dns:
    - https://dns.google/dns-query
    - https://dns10.quad9.net/dns-query
    - https://dns.quad9.net/dns-query
    - https://doh.opendns.com/dns-query
    - https://cloudflare-dns.com/dns-query
    国内dns:
    - quic://223.5.5.5:853
    - quic://223.6.6.6:853
    - https://doh.pub/dns-query
    - https://rubyfish.cn/dns-query
    - https://dns.alidns.com/dns-query
    兜底dns:
    - https://dns.nextdns.io
    - https://dns.google/dns-query
    - https://dns.switch.ch/dns-query
    - https://cloudflare-dns.com/dns-query
  forward:
  - proxy_rule_set:
      match: https://whatshub.top/rule/Binance.list
      value: 国外dns
      disabled: false
  - proxy_rule_set:
      match: https://yfamilys.com/rule/Telegram.list
      value: 国外dns
      disabled: false
  - proxy_rule_set:
      match: https://yfamilys.com/rule/TikTok.list
      value: 国外dns
      disabled: false
  - proxy_rule_set:
      match: https://yfamilys.com/rule/YouTube.list
      value: 国外dns
      disabled: false
  - proxy_rule_set:
      match: https://yfamilys.com/rule/Instagram.list
      value: 国外dns
      disabled: false
  - proxy_rule_set:
      match: https://yfamilys.com/rule/Twitter.list
      value: 国外dns
      disabled: false
  - proxy_rule_set:
      match: https://yfamilys.com/rule/ProxyMedia.list
      value: 国外dns
      disabled: false
  - proxy_rule_set:
      match: https://yfamilys.com/rule/Google.list
      value: 国外dns
      disabled: false
  - proxy_rule_set:
      match: https://yfamilys.com/rule/Cloudflare.list
      value: 国外dns
      disabled: false
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/GMOogway/shadowrocket-rules/master/sr_proxy_list.module
      value: 国外dns
      disabled: false
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/direct.txt
      value: 国内dns
      disabled: false
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/GMOogway/shadowrocket-rules/master/sr_direct_list.module
      value: 国内dns
      disabled: false
  - domain_wildcard:
      match: '*'
      value: 兜底dns
      disabled: false
policy_groups:
- external:
    name: '机场订阅'
    type: select
    urls:
    - 这里添加你的机场订阅
    hidden: true
- select:
    name: PROXY
    policies:
    - '机场订阅'
    flatten: true
    icon: https://iili.io/fKClisn.png
    hidden: false
